services:
  db:
    image: postgres:17.4
    hostname: postgres
    restart: 'always'
    volumes:
      - pgdata17:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
  web:
    image: resource-locker:latest
    command:
      - /bin/sh
      - -c
      - bundle exec rackup config.ru -o 0.0.0.0 -p 3000
    volumes:
      - .:/resource-locker
    ports:
      - "3001:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://test@db:5432
volumes:
  pgdata17:
